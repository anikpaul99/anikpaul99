<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#03050f"/>
      <stop offset="100%" stop-color="#080312"/>
    </linearGradient>
    <radialGradient id="neb1" cx="15%" cy="55%" r="45%">
      <stop offset="0%"  stop-color="#00d4aa" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="88%" cy="40%" r="38%">
      <stop offset="0%"  stop-color="#7c3aed" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="55%" r="35%">
      <stop offset="0%"  stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00d4aa" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="borderTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="25%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="75%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="320" fill="url(#bg)"/>
  <rect width="900" height="320" fill="url(#neb1)"/>
  <rect width="900" height="320" fill="url(#neb2)"/>
  <rect width="900" height="320" fill="url(#centerGlow)"/>

  <!-- BORDER LINES -->
  <line x1="0" y1="0.5"   x2="900" y2="0.5"   stroke="url(#borderTop)" stroke-width="1"/>
  <line x1="0" y1="319.5" x2="900" y2="319.5" stroke="url(#borderTop)" stroke-width="1"/>

  <!-- STAR FIELD — deep background -->
  <g fill="#c8d8ff" opacity="0.3">
    <circle cx="28"  cy="14"  r="0.5"/><circle cx="71"  cy="38"  r="0.4"/>
    <circle cx="118" cy="9"   r="0.5"/><circle cx="162" cy="52"  r="0.4"/>
    <circle cx="215" cy="24"  r="0.5"/><circle cx="278" cy="61"  r="0.4"/>
    <circle cx="333" cy="17"  r="0.5"/><circle cx="389" cy="44"  r="0.4"/>
    <circle cx="444" cy="8"   r="0.5"/><circle cx="501" cy="33"  r="0.4"/>
    <circle cx="557" cy="19"  r="0.5"/><circle cx="614" cy="56"  r="0.4"/>
    <circle cx="669" cy="11"  r="0.5"/><circle cx="724" cy="40"  r="0.4"/>
    <circle cx="779" cy="25"  r="0.5"/><circle cx="835" cy="63"  r="0.4"/>
    <circle cx="874" cy="16"  r="0.5"/>
    <circle cx="42"  cy="88"  r="0.4"/><circle cx="97"  cy="110" r="0.5"/>
    <circle cx="151" cy="79"  r="0.4"/><circle cx="204" cy="101" r="0.5"/>
    <circle cx="259" cy="85"  r="0.4"/><circle cx="316" cy="114" r="0.5"/>
    <circle cx="371" cy="93"  r="0.4"/><circle cx="426" cy="76"  r="0.5"/>
    <circle cx="483" cy="107" r="0.4"/><circle cx="538" cy="84"  r="0.5"/>
    <circle cx="593" cy="99"  r="0.4"/><circle cx="648" cy="72"  r="0.5"/>
    <circle cx="703" cy="112" r="0.4"/><circle cx="758" cy="88"  r="0.5"/>
    <circle cx="813" cy="103" r="0.4"/><circle cx="864" cy="77"  r="0.5"/>
    <circle cx="19"  cy="195" r="0.4"/><circle cx="55"  cy="228" r="0.5"/>
    <circle cx="103" cy="212" r="0.4"/><circle cx="157" cy="248" r="0.5"/>
    <circle cx="208" cy="234" r="0.4"/><circle cx="262" cy="218" r="0.5"/>
    <circle cx="318" cy="252" r="0.4"/><circle cx="372" cy="239" r="0.5"/>
    <circle cx="484" cy="245" r="0.5"/><circle cx="540" cy="260" r="0.4"/>
    <circle cx="596" cy="232" r="0.5"/><circle cx="652" cy="255" r="0.4"/>
    <circle cx="708" cy="270" r="0.5"/><circle cx="764" cy="243" r="0.4"/>
    <circle cx="820" cy="258" r="0.5"/><circle cx="876" cy="230" r="0.4"/>
  </g>

  <!-- STAR FIELD — mid layer -->
  <g fill="white" filter="url(#glow)" opacity="0.5">
    <circle cx="58"  cy="28"  r="0.8"/><circle cx="143" cy="67"  r="0.7"/>
    <circle cx="244" cy="35"  r="0.9"/><circle cx="353" cy="72"  r="0.7"/>
    <circle cx="463" cy="29"  r="0.8"/><circle cx="574" cy="58"  r="0.7"/>
    <circle cx="685" cy="33"  r="0.9"/><circle cx="796" cy="69"  r="0.7"/>
    <circle cx="855" cy="41"  r="0.8"/>
    <circle cx="32"  cy="152" r="0.7"/><circle cx="178" cy="171" r="0.8"/>
    <circle cx="326" cy="155" r="0.7"/><circle cx="748" cy="163" r="0.8"/>
    <circle cx="853" cy="148" r="0.7"/>
    <circle cx="78"  cy="280" r="0.8"/><circle cx="234" cy="295" r="0.7"/>
    <circle cx="581" cy="288" r="0.8"/><circle cx="739" cy="300" r="0.7"/>
    <circle cx="884" cy="285" r="0.8"/>
  </g>

  <!-- STAR FIELD — bright foreground -->
  <g fill="white" filter="url(#glow)">
    <circle cx="88"  cy="55"  r="1.4" opacity="0.9"/>
    <circle cx="812" cy="48"  r="1.5" opacity="0.85"/>
    <circle cx="189" cy="137" r="1.2" opacity="0.8"/>
    <circle cx="671" cy="117" r="1.3" opacity="0.85"/>
    <circle cx="455" cy="291" r="1.2" opacity="0.65"/>
    <circle cx="22"  cy="268" r="1.1" opacity="0.65"/>
    <circle cx="873" cy="272" r="1.2" opacity="0.7"/>
  </g>

  <!-- CONSTELLATION LEFT — teal, gentle -->
  <g stroke="#00d4aa" stroke-width="0.5" opacity="0.25" fill="none">
    <line x1="52"  y1="148" x2="78"  y2="126"/>
    <line x1="78"  y1="126" x2="112" y2="138"/>
    <line x1="112" y1="138" x2="138" y2="116"/>
    <line x1="138" cy="116" x2="155" y2="144"/>
    <line x1="112" y1="138" x2="118" y2="174"/>
    <line x1="52"  y1="148" x2="38"  y2="178"/>
  </g>
  <g fill="#00d4aa" filter="url(#nodeGlow)">
    <circle cx="52"  cy="148" r="1.4" opacity="0.75"/>
    <circle cx="78"  cy="126" r="1.9" opacity="0.9"/>
    <circle cx="112" cy="138" r="2.3" opacity="1.0"/>
    <circle cx="138" cy="116" r="1.7" opacity="0.85"/>
    <circle cx="155" cy="144" r="1.4" opacity="0.75"/>
    <circle cx="118" cy="174" r="1.3" opacity="0.7"/>
    <circle cx="38"  cy="178" r="1.2" opacity="0.65"/>
  </g>

  <!-- CONSTELLATION RIGHT — violet, gentle -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.25" fill="none">
    <line x1="740" y1="100" x2="768" y2="82"/>
    <line x1="768" y1="82"  x2="800" y2="74"/>
    <line x1="800" y1="74"  x2="832" y2="84"/>
    <line x1="832" y1="84"  x2="855" y2="108"/>
    <line x1="800" y1="74"  x2="800" y2="112"/>
  </g>
  <g fill="#7c3aed" filter="url(#nodeGlow)">
    <circle cx="740" cy="100" r="1.4" opacity="0.75"/>
    <circle cx="768" cy="82"  r="1.7" opacity="0.85"/>
    <circle cx="800" cy="74"  r="2.1" opacity="1.0"/>
    <circle cx="832" cy="84"  r="1.7" opacity="0.85"/>
    <circle cx="855" cy="108" r="1.4" opacity="0.75"/>
    <circle cx="800" cy="112" r="1.3" opacity="0.7"/>
  </g>

  <!-- TEXT: small label -->
  <text
    x="450" y="128"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    letter-spacing="8"
    fill="#00d4aa"
    opacity="0.55"
  >FRONT-END DEVELOPER</text>

  <!-- MAIN NAME — large, commanding -->
  <text
    x="450" y="192"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="400"
    letter-spacing="14"
    fill="white"
    filter="url(#tglow)"
    opacity="0.97"
  >ANIK PAUL</text>

  <!-- Accent gradient line -->
  <line x1="160" y1="210" x2="740" y2="210" stroke="url(#accentLine)" stroke-width="0.8"/>

  <!-- Subtitle -->
  <text
    x="450" y="234"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    letter-spacing="5"
    fill="white"
    opacity="0.25"
  >REACT  ·  NEXT.JS  ·  JAVASCRIPT</text>

  <!-- Tagline italic -->
  <text
    x="450" y="275"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13.5"
    font-style="italic"
    letter-spacing="0.5"
    fill="white"
    opacity="0.30"
  >crafting interfaces that feel like they belong to the future</text>

</svg>
