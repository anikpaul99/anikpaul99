<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0e0e14"/>
      <stop offset="100%" stop-color="#060608"/>
    </radialGradient>
    <radialGradient id="neb1" cx="14%" cy="52%" r="42%">
      <stop offset="0%"  stop-color="#b0c4e0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#b0c4e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="86%" cy="44%" r="40%">
      <stop offset="0%"  stop-color="#b0c4e0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#b0c4e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="platLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#d8e2f8" stop-opacity="0.20"/>
      <stop offset="42%"  stop-color="#f4f8ff" stop-opacity="0.65"/>
      <stop offset="58%"  stop-color="#f4f8ff" stop-opacity="0.65"/>
      <stop offset="82%"  stop-color="#d8e2f8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="70%"  stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ng" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Name glow reduced to 4 -->
    <filter id="tg" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="340" fill="url(#bg)"/>
  <rect width="900" height="340" fill="url(#neb1)"/>
  <rect width="900" height="340" fill="url(#neb2)"/>
  <line x1="0" y1="0.5"   x2="900" y2="0.5"   stroke="url(#edgeLine)" stroke-width="1"/>
  <line x1="0" y1="339.5" x2="900" y2="339.5" stroke="url(#edgeLine)" stroke-width="1"/>

  <!-- STAR FIELD — static background dust -->
  <g fill="#c0d0e8" opacity="0.22">
    <circle cx="22" cy="15" r="0.5"/><circle cx="68" cy="38" r="0.4"/>
    <circle cx="114" cy="10" r="0.5"/><circle cx="159" cy="50" r="0.4"/>
    <circle cx="208" cy="24" r="0.5"/><circle cx="254" cy="62" r="0.4"/>
    <circle cx="302" cy="16" r="0.5"/><circle cx="348" cy="42" r="0.4"/>
    <circle cx="396" cy="9"  r="0.5"/><circle cx="443" cy="32" r="0.4"/>
    <circle cx="491" cy="19" r="0.5"/><circle cx="538" cy="54" r="0.4"/>
    <circle cx="586" cy="12" r="0.5"/><circle cx="632" cy="46" r="0.4"/>
    <circle cx="680" cy="24" r="0.5"/><circle cx="726" cy="58" r="0.4"/>
    <circle cx="774" cy="18" r="0.5"/><circle cx="820" cy="40" r="0.4"/>
    <circle cx="868" cy="11" r="0.5"/>
    <circle cx="36"  cy="86" r="0.4"/><circle cx="82" cy="106" r="0.5"/>
    <circle cx="130" cy="76" r="0.4"/><circle cx="176" cy="98" r="0.5"/>
    <circle cx="224" cy="90" r="0.4"/><circle cx="270" cy="116" r="0.5"/>
    <circle cx="318" cy="80" r="0.4"/><circle cx="364" cy="103" r="0.5"/>
    <circle cx="412" cy="70" r="0.4"/><circle cx="458" cy="94" r="0.5"/>
    <circle cx="506" cy="84" r="0.4"/><circle cx="552" cy="110" r="0.5"/>
    <circle cx="600" cy="76" r="0.4"/><circle cx="646" cy="100" r="0.5"/>
    <circle cx="694" cy="86" r="0.4"/><circle cx="740" cy="114" r="0.5"/>
    <circle cx="788" cy="78" r="0.4"/><circle cx="834" cy="102" r="0.5"/>
    <circle cx="882" cy="90" r="0.4"/>
    <circle cx="18"  cy="248" r="0.4"/><circle cx="62" cy="270" r="0.5"/>
    <circle cx="110" cy="253" r="0.4"/><circle cx="158" cy="282" r="0.5"/>
    <circle cx="206" cy="264" r="0.4"/><circle cx="254" cy="296" r="0.5"/>
    <circle cx="302" cy="256" r="0.4"/><circle cx="348" cy="278" r="0.5"/>
    <circle cx="396" cy="290" r="0.4"/><circle cx="444" cy="260" r="0.5"/>
    <circle cx="492" cy="276" r="0.4"/><circle cx="540" cy="303" r="0.5"/>
    <circle cx="588" cy="262" r="0.4"/><circle cx="636" cy="286" r="0.5"/>
    <circle cx="684" cy="273" r="0.4"/><circle cx="732" cy="306" r="0.5"/>
    <circle cx="780" cy="266" r="0.4"/><circle cx="828" cy="290" r="0.5"/>
    <circle cx="876" cy="278" r="0.4"/>
  </g>

  <!-- TWINKLING STARS — opacity animation only (GitHub-safe) -->
  <circle cx="48"  cy="26"  r="1.0" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.9;0.15;0.9" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="145" cy="64"  r="0.8" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="237" cy="34"  r="1.1" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.8;0.1;0.8"  dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="332" cy="71"  r="0.8" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="428" cy="27"  r="1.0" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.7;0.1;0.7"  dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="524" cy="58"  r="0.8" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.4;1.0;0.4"  dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="38"  r="1.1" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.9;0.2;0.9"  dur="3.9s" repeatCount="indefinite"/></circle>
  <circle cx="716" cy="72"  r="0.8" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="812" cy="31"  r="1.0" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.6;0.05;0.6" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="866" cy="65"  r="0.8" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.3;0.9;0.3"  dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="30"  cy="155" r="0.9" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.5;0.1;0.5"  dur="5.1s" repeatCount="indefinite"/></circle>
  <circle cx="180" cy="166" r="0.7" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.8;0.2;0.8"  dur="3.7s" repeatCount="indefinite"/></circle>
  <circle cx="460" cy="170" r="0.9" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.2;0.9;0.2"  dur="4.8s" repeatCount="indefinite"/></circle>
  <circle cx="742" cy="158" r="0.7" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.7;0.1;0.7"  dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="848" cy="146" r="0.9" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  <!-- Bright accent twinkling stars -->
  <circle cx="86"  cy="52"  r="1.5" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.9;0.3;0.9"  dur="4.1s" repeatCount="indefinite"/></circle>
  <circle cx="274" cy="19"  r="1.3" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.4;1.0;0.4"  dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="488" cy="41"  r="1.4" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.85;0.2;0.85" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="694" cy="16"  r="1.5" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.4;0.9;0.4"  dur="4.6s" repeatCount="indefinite"/></circle>
  <circle cx="856" cy="47"  r="1.3" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.8;0.15;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="164" cy="130" r="1.2" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.6;0.05;0.6" dur="5.3s" repeatCount="indefinite"/></circle>
  <circle cx="728" cy="120" r="1.3" fill="white" filter="url(#sg)"><animate attributeName="opacity" values="0.2;0.8;0.2"  dur="3.8s" repeatCount="indefinite"/></circle>

  <!-- CONSTELLATION LEFT — opacity fade-in then pulse (GitHub-safe) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.4s" fill="freeze"/>
    <g stroke="white" stroke-width="0.5" fill="none" opacity="0.22">
      <line x1="46"  y1="162" x2="76"  y2="140"/>
      <line x1="76"  y1="140" x2="110" y2="152"/>
      <line x1="110" y1="152" x2="136" y2="132"/>
      <line x1="136" y1="132" x2="156" y2="160"/>
      <line x1="110" y1="152" x2="114" y2="190"/>
      <line x1="46"  y1="162" x2="28"  y2="190"/>
    </g>
    <g fill="white" filter="url(#ng)">
      <circle cx="46"  cy="162" r="1.4" opacity="0.62"/>
      <circle cx="76"  cy="140" r="1.9" opacity="0.82">
        <animate attributeName="opacity" values="0.82;1.0;0.82" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="110" cy="152" r="2.3" opacity="0.95">
        <animate attributeName="opacity" values="0.95;0.6;0.95" dur="4.8s" begin="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="136" cy="132" r="1.7" opacity="0.75"/>
      <circle cx="156" cy="160" r="1.4" opacity="0.62"/>
      <circle cx="114" cy="190" r="1.2" opacity="0.55"/>
      <circle cx="28"  cy="190" r="1.1" opacity="0.50"/>
    </g>
  </g>

  <!-- CONSTELLATION RIGHT — opacity fade-in then pulse -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.7s" fill="freeze"/>
    <g stroke="white" stroke-width="0.5" fill="none" opacity="0.22">
      <line x1="750" y1="98"  x2="780" y2="80"/>
      <line x1="780" y1="80"  x2="812" y2="72"/>
      <line x1="812" y1="72"  x2="844" y2="83"/>
      <line x1="844" y1="83"  x2="864" y2="108"/>
      <line x1="812" y1="72"  x2="810" y2="112"/>
      <line x1="780" y1="80"  x2="778" y2="118"/>
      <line x1="778" y1="118" x2="810" y2="112"/>
    </g>
    <g fill="white" filter="url(#ng)">
      <circle cx="750" cy="98"  r="1.4" opacity="0.62"/>
      <circle cx="780" cy="80"  r="1.8" opacity="0.80">
        <animate attributeName="opacity" values="0.80;1.0;0.80" dur="4.2s" begin="2.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="812" cy="72"  r="2.2" opacity="0.95">
        <animate attributeName="opacity" values="0.95;0.55;0.95" dur="5.0s" begin="2.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="844" cy="83"  r="1.8" opacity="0.80"/>
      <circle cx="864" cy="108" r="1.4" opacity="0.62"/>
      <circle cx="810" cy="112" r="1.4" opacity="0.65"/>
      <circle cx="778" cy="118" r="1.3" opacity="0.60"/>
    </g>
  </g>

  <!-- CORNER MICRO-CONSTELLATIONS -->
  <g stroke="white" stroke-width="0.4" opacity="0.13" fill="none">
    <line x1="24" y1="36" x2="46" y2="22"/><line x1="46" y1="22" x2="60" y2="43"/><line x1="60" y1="43" x2="24" y2="36"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.40">
    <circle cx="24" cy="36" r="1.1"/><circle cx="46" cy="22" r="1.3"/><circle cx="60" cy="43" r="1.1"/>
  </g>

  <g stroke="white" stroke-width="0.4" opacity="0.13" fill="none">
    <line x1="844" y1="29" x2="864" y2="14"/><line x1="864" y1="14" x2="880" y2="36"/><line x1="864" y1="14" x2="860" y2="51"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.38">
    <circle cx="844" cy="29" r="1.1"/><circle cx="864" cy="14" r="1.3"/><circle cx="880" cy="36" r="1.1"/><circle cx="860" cy="51" r="1.0"/>
  </g>

  <g stroke="white" stroke-width="0.4" opacity="0.10" fill="none">
    <line x1="32" y1="278" x2="58" y2="263"/><line x1="58" y1="263" x2="76" y2="285"/><line x1="76" y1="285" x2="52" y2="299"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.34">
    <circle cx="32" cy="278" r="1.0"/><circle cx="58" cy="263" r="1.2"/><circle cx="76" cy="285" r="1.0"/><circle cx="52" cy="299" r="0.9"/>
  </g>

  <g stroke="white" stroke-width="0.4" opacity="0.10" fill="none">
    <line x1="828" y1="272" x2="852" y2="258"/><line x1="852" y1="258" x2="872" y2="278"/><line x1="852" y1="258" x2="854" y2="295"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.34">
    <circle cx="828" cy="272" r="1.0"/><circle cx="852" cy="258" r="1.2"/><circle cx="872" cy="278" r="1.0"/><circle cx="854" cy="295" r="0.9"/>
  </g>

  <!-- TYPOGRAPHY -->

  <!-- SOFTWARE ENGINEER label -->
  <text x="450" y="126"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="12.5" letter-spacing="11"
    fill="white" opacity="0.46"
    filter="url(#lg)"
  >SOFTWARE  ENGINEER</text>

  <!-- Name — shadow layer -->
  <text x="450" y="200"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76" font-weight="400" letter-spacing="16"
    fill="#e8eeff" opacity="0.04"
    transform="translate(0,3)"
  >ANIK PAUL</text>

  <!-- Name — main, glow reduced to 4 -->
  <text x="450" y="200"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="76" font-weight="400" letter-spacing="16"
    fill="white" filter="url(#tg)" opacity="0.97"
  >ANIK PAUL</text>

  <!-- Platinum divider -->
  <line x1="120" y1="218" x2="780" y2="218" stroke="url(#platLine)" stroke-width="0.9"/>

  <!-- Stack -->
  <text x="450" y="246"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="12.5" letter-spacing="6"
    fill="white" opacity="0.44"
  >REACT  ·  NEXT.JS  ·  NODE.JS  ·  NESTJS</text>

  <!-- Tagline -->
  <text x="450" y="296"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16" font-style="italic" letter-spacing="0.5"
    fill="white" opacity="0.50"
  >crafting interfaces that feel like they belong to the future</text>

</svg>
