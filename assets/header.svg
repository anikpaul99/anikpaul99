<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>

    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0c0c0f"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>

    <radialGradient id="neb1" cx="12%" cy="50%" r="40%">
      <stop offset="0%"  stop-color="#a0b4d0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a0b4d0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="neb2" cx="88%" cy="45%" r="38%">
      <stop offset="0%"  stop-color="#a0b4d0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#a0b4d0" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centreBreath" cx="50%" cy="52%" r="28%">
      <stop offset="0%"  stop-color="#c8d4e8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#c8d4e8" stop-opacity="0"/>
    </radialGradient>

    <!-- Platinum shimmer line -->
    <linearGradient id="platLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#d0d8e8" stop-opacity="0.18"/>
      <stop offset="45%"  stop-color="#f0f4ff" stop-opacity="0.60"/>
      <stop offset="55%"  stop-color="#f0f4ff" stop-opacity="0.60"/>
      <stop offset="80%"  stop-color="#d0d8e8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Edge border hairlines -->
    <linearGradient id="edgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="70%"  stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Star glow -->
    <filter id="sg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Constellation node glow -->
    <filter id="ng" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Name glow — reduced from 10 to 6.5 -->
    <filter id="tg" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="6.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Label gentle glow -->
    <filter id="lg" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="340" fill="url(#bg)"/>
  <rect width="900" height="340" fill="url(#neb1)"/>
  <rect width="900" height="340" fill="url(#neb2)"/>
  <rect width="900" height="340" fill="url(#centreBreath)"/>

  <!-- Edge hairlines -->
  <line x1="0" y1="0.5"   x2="900" y2="0.5"   stroke="url(#edgeLine)" stroke-width="1"/>
  <line x1="0" y1="339.5" x2="900" y2="339.5" stroke="url(#edgeLine)" stroke-width="1"/>

  <!-- ═══ STARS — Layer 1: faint dust ═══ -->
  <g fill="#b8c8e0" opacity="0.22">
    <circle cx="18"  cy="12"  r="0.5"/><circle cx="62"  cy="34"  r="0.4"/>
    <circle cx="107" cy="8"   r="0.5"/><circle cx="153" cy="47"  r="0.4"/>
    <circle cx="201" cy="21"  r="0.5"/><circle cx="248" cy="58"  r="0.4"/>
    <circle cx="297" cy="14"  r="0.5"/><circle cx="344" cy="39"  r="0.4"/>
    <circle cx="392" cy="7"   r="0.5"/><circle cx="440" cy="29"  r="0.4"/>
    <circle cx="489" cy="17"  r="0.5"/><circle cx="537" cy="51"  r="0.4"/>
    <circle cx="586" cy="11"  r="0.5"/><circle cx="633" cy="43"  r="0.4"/>
    <circle cx="681" cy="22"  r="0.5"/><circle cx="728" cy="56"  r="0.4"/>
    <circle cx="776" cy="18"  r="0.5"/><circle cx="823" cy="37"  r="0.4"/>
    <circle cx="868" cy="9"   r="0.5"/>
    <circle cx="33"  cy="82"  r="0.4"/><circle cx="79"  cy="104" r="0.5"/>
    <circle cx="126" cy="74"  r="0.4"/><circle cx="173" cy="96"  r="0.5"/>
    <circle cx="222" cy="88"  r="0.4"/><circle cx="269" cy="114" r="0.5"/>
    <circle cx="318" cy="79"  r="0.4"/><circle cx="365" cy="101" r="0.5"/>
    <circle cx="414" cy="68"  r="0.4"/><circle cx="461" cy="92"  r="0.5"/>
    <circle cx="510" cy="83"  r="0.4"/><circle cx="557" cy="107" r="0.5"/>
    <circle cx="606" cy="75"  r="0.4"/><circle cx="653" cy="97"  r="0.5"/>
    <circle cx="702" cy="85"  r="0.4"/><circle cx="749" cy="112" r="0.5"/>
    <circle cx="798" cy="77"  r="0.4"/><circle cx="845" cy="99"  r="0.5"/>
    <circle cx="888" cy="88"  r="0.4"/>
    <circle cx="14"  cy="240" r="0.4"/><circle cx="59"  cy="265" r="0.5"/>
    <circle cx="108" cy="248" r="0.4"/><circle cx="155" cy="278" r="0.5"/>
    <circle cx="204" cy="260" r="0.4"/><circle cx="251" cy="292" r="0.5"/>
    <circle cx="300" cy="250" r="0.4"/><circle cx="347" cy="272" r="0.5"/>
    <circle cx="396" cy="284" r="0.4"/><circle cx="444" cy="255" r="0.5"/>
    <circle cx="493" cy="270" r="0.4"/><circle cx="541" cy="295" r="0.5"/>
    <circle cx="590" cy="258" r="0.4"/><circle cx="638" cy="280" r="0.5"/>
    <circle cx="687" cy="268" r="0.4"/><circle cx="735" cy="300" r="0.5"/>
    <circle cx="784" cy="262" r="0.4"/><circle cx="832" cy="285" r="0.5"/>
    <circle cx="878" cy="274" r="0.4"/>
  </g>

  <!-- ═══ STARS — Layer 2: mid glow ═══ -->
  <g fill="white" filter="url(#sg)" opacity="0.45">
    <circle cx="44"  cy="23"  r="0.8"/><circle cx="137" cy="61"  r="0.7"/>
    <circle cx="229" cy="31"  r="0.9"/><circle cx="323" cy="68"  r="0.7"/>
    <circle cx="418" cy="24"  r="0.8"/><circle cx="512" cy="55"  r="0.7"/>
    <circle cx="607" cy="38"  r="0.9"/><circle cx="701" cy="72"  r="0.7"/>
    <circle cx="796" cy="29"  r="0.8"/><circle cx="862" cy="62"  r="0.7"/>
    <circle cx="28"  cy="148" r="0.7"/><circle cx="174" cy="162" r="0.8"/>
    <circle cx="318" cy="151" r="0.7"/><circle cx="462" cy="165" r="0.8"/>
    <circle cx="744" cy="158" r="0.7"/><circle cx="845" cy="144" r="0.8"/>
    <circle cx="72"  cy="290" r="0.7"/><circle cx="218" cy="308" r="0.8"/>
    <circle cx="365" cy="296" r="0.7"/><circle cx="511" cy="312" r="0.8"/>
    <circle cx="657" cy="300" r="0.7"/><circle cx="803" cy="316" r="0.8"/>
    <circle cx="886" cy="294" r="0.7"/>
  </g>

  <!-- ═══ STARS — Layer 3: bright foreground ═══ -->
  <g fill="white" filter="url(#sg)">
    <circle cx="83"  cy="49"  r="1.5" opacity="0.85"/>
    <circle cx="270" cy="17"  r="1.3" opacity="0.80"/>
    <circle cx="481" cy="38"  r="1.4" opacity="0.82"/>
    <circle cx="690" cy="14"  r="1.5" opacity="0.85"/>
    <circle cx="852" cy="44"  r="1.3" opacity="0.80"/>
    <circle cx="162" cy="128" r="1.2" opacity="0.75"/>
    <circle cx="724" cy="118" r="1.3" opacity="0.78"/>
    <circle cx="38"  cy="312" r="1.1" opacity="0.65"/>
    <circle cx="449" cy="326" r="1.2" opacity="0.68"/>
    <circle cx="871" cy="318" r="1.1" opacity="0.65"/>
  </g>

  <!-- ═══ CONSTELLATION LEFT ═══ -->
  <g stroke="white" stroke-width="0.45" opacity="0.18" fill="none">
    <line x1="46"  y1="162" x2="74"  y2="141"/>
    <line x1="74"  y1="141" x2="106" y2="152"/>
    <line x1="106" y1="152" x2="132" y2="134"/>
    <line x1="132" y1="134" x2="152" y2="160"/>
    <line x1="106" y1="152" x2="110" y2="188"/>
    <line x1="46"  y1="162" x2="30"  y2="188"/>
  </g>
  <g fill="white" filter="url(#ng)">
    <circle cx="46"  cy="162" r="1.3" opacity="0.65"/>
    <circle cx="74"  cy="141" r="1.8" opacity="0.82"/>
    <circle cx="106" cy="152" r="2.2" opacity="0.95"/>
    <circle cx="132" cy="134" r="1.6" opacity="0.75"/>
    <circle cx="152" cy="160" r="1.3" opacity="0.65"/>
    <circle cx="110" cy="188" r="1.2" opacity="0.60"/>
    <circle cx="30"  cy="188" r="1.1" opacity="0.55"/>
  </g>

  <!-- ═══ CONSTELLATION RIGHT ═══ -->
  <g stroke="white" stroke-width="0.45" opacity="0.18" fill="none">
    <line x1="748" y1="95"  x2="776" y2="80"/>
    <line x1="776" y1="80"  x2="808" y2="72"/>
    <line x1="808" y1="72"  x2="840" y2="82"/>
    <line x1="840" y1="82"  x2="860" y2="106"/>
    <line x1="808" y1="72"  x2="806" y2="110"/>
    <line x1="776" y1="80"  x2="774" y2="115"/>
    <line x1="774" y1="115" x2="806" y2="110"/>
  </g>
  <g fill="white" filter="url(#ng)">
    <circle cx="748" cy="95"  r="1.3" opacity="0.65"/>
    <circle cx="776" cy="80"  r="1.7" opacity="0.80"/>
    <circle cx="808" cy="72"  r="2.1" opacity="0.95"/>
    <circle cx="840" cy="82"  r="1.7" opacity="0.80"/>
    <circle cx="860" cy="106" r="1.3" opacity="0.65"/>
    <circle cx="806" cy="110" r="1.4" opacity="0.70"/>
    <circle cx="774" cy="115" r="1.3" opacity="0.65"/>
  </g>

  <!-- ═══ CORNER MICRO-CONSTELLATIONS ═══ -->
  <g stroke="white" stroke-width="0.35" opacity="0.12" fill="none">
    <line x1="22" y1="36" x2="44" y2="22"/><line x1="44" y1="22" x2="58" y2="42"/>
    <line x1="58" y1="42" x2="22" y2="36"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.40">
    <circle cx="22" cy="36" r="1.0"/><circle cx="44" cy="22" r="1.2"/>
    <circle cx="58" cy="42" r="1.0"/>
  </g>

  <g stroke="white" stroke-width="0.35" opacity="0.12" fill="none">
    <line x1="842" y1="28" x2="862" y2="14"/><line x1="862" y1="14" x2="878" y2="35"/>
    <line x1="862" y1="14" x2="858" y2="48"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.38">
    <circle cx="842" cy="28" r="1.0"/><circle cx="862" cy="14" r="1.2"/>
    <circle cx="878" cy="35" r="1.0"/><circle cx="858" cy="48" r="0.9"/>
  </g>

  <g stroke="white" stroke-width="0.35" opacity="0.10" fill="none">
    <line x1="30"  y1="274" x2="56"  y2="260"/>
    <line x1="56"  y1="260" x2="74"  y2="280"/>
    <line x1="74"  y1="280" x2="50"  y2="294"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.35">
    <circle cx="30"  cy="274" r="0.9"/><circle cx="56"  cy="260" r="1.1"/>
    <circle cx="74"  cy="280" r="0.9"/><circle cx="50"  cy="294" r="0.8"/>
  </g>

  <g stroke="white" stroke-width="0.35" opacity="0.10" fill="none">
    <line x1="826" y1="268" x2="850" y2="254"/>
    <line x1="850" y1="254" x2="870" y2="272"/>
    <line x1="850" y1="254" x2="852" y2="288"/>
  </g>
  <g fill="white" filter="url(#ng)" opacity="0.35">
    <circle cx="826" cy="268" r="0.9"/><circle cx="850" cy="254" r="1.1"/>
    <circle cx="870" cy="272" r="0.9"/><circle cx="852" cy="288" r="0.8"/>
  </g>

  <!-- ═══ TYPOGRAPHY ═══ -->

  <!-- Overline: SOFTWARE ENGINEER — clearly readable -->
  <text
    x="450" y="130"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    letter-spacing="10"
    fill="white"
    opacity="0.45"
    filter="url(#lg)"
  >SOFTWARE ENGINEER</text>

  <!-- Name shadow/halo layer -->
  <text
    x="450" y="204"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    letter-spacing="16"
    fill="#e8eeff"
    opacity="0.06"
    transform="translate(0,3)"
  >ANIK PAUL</text>

  <!-- Name — main, reduced glow -->
  <text
    x="450" y="204"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    letter-spacing="16"
    fill="white"
    filter="url(#tg)"
    opacity="0.97"
  >ANIK PAUL</text>

  <!-- Platinum shimmer divider line -->
  <line x1="140" y1="222" x2="760" y2="222" stroke="url(#platLine)" stroke-width="0.9"/>

  <!-- Stack — clearly readable -->
  <text
    x="450" y="250"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5"
    letter-spacing="6"
    fill="white"
    opacity="0.42"
  >REACT  ·  NEXT.JS  ·  NODE.JS  ·  NESTJS</text>

  <!-- Tagline — italic serif, readable -->
  <text
    x="450" y="296"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    font-style="italic"
    letter-spacing="0.5"
    fill="white"
    opacity="0.48"
  >crafting interfaces that feel like they belong to the future</text>

</svg>
