      <stop offset="20%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="80%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="860" height="218" fill="url(#bg)" rx="4"/>
