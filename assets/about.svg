<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="20%"  stop-color="white" stop-opacity="0.07"/>
      <stop offset="80%"  stop-color="white" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="promptGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="200" fill="url(#bg)" rx="4"/>
  <rect x="0" y="0"   width="860" height="1" fill="url(#borderGrad)"/>
  <rect x="0" y="199" width="860" height="1" fill="url(#borderGrad)"/>
  <rect x="0" y="0"   width="1"  height="200" fill="url(#borderGrad)"/>
  <rect x="859" y="0" width="1"  height="200" fill="url(#borderGrad)"/>

  <!-- Prompt symbol -->
  <text x="40" y="44" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.25" letter-spacing="2">~/anikpaul</text>
  <text x="148" y="44" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">$</text>
  <text x="162" y="44" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.55" letter-spacing="1">whoami</text>

  <!-- Cursor blink block -->
  <rect x="234" y="31" width="8" height="14" fill="white" opacity="0.4"/>

  <!-- Divider -->
  <line x1="40" y1="56" x2="820" y2="56" stroke="white" stroke-width="0.4" opacity="0.06"/>

  <!-- Output lines -->
  <!-- Line 1 -->
  <text x="40" y="80" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.18" letter-spacing="1">name</text>
  <text x="100" y="80" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">→</text>
  <text x="120" y="80" font-family="Georgia, serif" font-size="12.5" fill="white" opacity="0.65" letter-spacing="0.5">Anik Paul — Front-End Developer, Bangladesh</text>

  <!-- Line 2 -->
  <text x="40" y="104" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.18" letter-spacing="1">focus</text>
  <text x="100" y="104" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">→</text>
  <text x="120" y="104" font-family="Georgia, serif" font-size="12.5" fill="white" opacity="0.65" letter-spacing="0.5">Building beautiful UIs · Expanding into back-end</text>

  <!-- Line 3 -->
  <text x="40" y="128" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.18" letter-spacing="1">learning</text>
  <text x="120" y="128" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">→</text>
  <text x="140" y="128" font-family="Georgia, serif" font-size="12.5" fill="white" opacity="0.65" letter-spacing="0.5">NestJS · Prisma · PostgreSQL · System Design</text>

  <!-- Line 4 -->
  <text x="40" y="152" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.18" letter-spacing="1">writing</text>
  <text x="107" y="152" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">→</text>
  <text x="127" y="152" font-family="Georgia, serif" font-size="12.5" fill="white" opacity="0.65" letter-spacing="0.5">The Weekly Commit — a LinkedIn newsletter on JS and web dev</text>

  <!-- Line 5 -->
  <text x="40" y="176" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.18" letter-spacing="1">reach</text>
  <text x="96" y="176" font-family="'Courier New', monospace" font-size="12" fill="white" opacity="0.12">→</text>
  <text x="116" y="176" font-family="Georgia, serif" font-size="12.5" fill="white" opacity="0.65" letter-spacing="0.5">hello@paulanik.com · paulanik.com</text>

</svg>
