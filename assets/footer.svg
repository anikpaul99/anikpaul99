<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 130" width="860" height="130">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="bh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="25%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="75%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="20%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="80%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="35%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="65%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="qg" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="130" fill="url(#bg)" rx="4"/>
  <rect x="0"   y="0"   width="860" height="1"   fill="url(#bh)"/>
  <rect x="0"   y="129" width="860" height="1"   fill="url(#bh)"/>
  <rect x="0"   y="0"   width="1"   height="130" fill="url(#bv)"/>
  <rect x="859" y="0"   width="1"   height="130" fill="url(#bv)"/>

  <!-- Decorative large quote mark -->
  <text x="50" y="76"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80" fill="white" opacity="0.05" font-style="italic">"</text>

  <!-- Quote line 1 -->
  <text x="430" y="44" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-style="italic" letter-spacing="0.5"
    fill="white" opacity="0.84" filter="url(#qg)"
  >Design is not just what it looks like and feels like.</text>

  <!-- Quote line 2 -->
  <text x="430" y="70" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-style="italic" letter-spacing="0.5"
    fill="white" opacity="0.84" filter="url(#qg)"
  >Design is how it works.</text>

  <!-- Thin rule -->
  <line x1="180" y1="86" x2="680" y2="86" stroke="url(#rule)" stroke-width="0.7"/>

  <!-- Attribution -->
  <text x="430" y="108" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5" letter-spacing="4"
    fill="white" opacity="0.35"
  >— STEVE JOBS</text>

</svg>
