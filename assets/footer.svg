<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160" width="860" height="160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="bh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="25%"  stop-color="white" stop-opacity="0.09"/>
      <stop offset="75%"  stop-color="white" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bv" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="20%"  stop-color="white" stop-opacity="0.09"/>
      <stop offset="80%"  stop-color="white" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="platLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="35%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="65%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Views pill background -->
    <linearGradient id="pillBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#1e1e28"/>
    </linearGradient>
    <filter id="quoteglow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="860" height="160" fill="url(#bg)" rx="4"/>
  <rect x="0"   y="0"   width="860" height="1"   fill="url(#bh)"/>
  <rect x="0"   y="159" width="860" height="1"   fill="url(#bh)"/>
  <rect x="0"   y="0"   width="1"   height="160" fill="url(#bv)"/>
  <rect x="859" y="0"   width="1"   height="160" fill="url(#bv)"/>

  <!-- Opening quotation mark — large, decorative -->
  <text x="52" y="72"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72" fill="white" opacity="0.06"
    font-style="italic">"</text>

  <!-- Quote line 1 -->
  <text x="430" y="58" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-style="italic" letter-spacing="0.5"
    fill="white" opacity="0.82"
    filter="url(#quoteglow)"
  >Design is not just what it looks like and feels like.</text>

  <!-- Quote line 2 -->
  <text x="430" y="84" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18" font-style="italic" letter-spacing="0.5"
    fill="white" opacity="0.82"
    filter="url(#quoteglow)"
  >Design is how it works.</text>

  <!-- Thin rule under quote -->
  <line x1="160" y1="100" x2="700" y2="100" stroke="url(#platLine)" stroke-width="0.7"/>

  <!-- Attribution -->
  <text x="430" y="120" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5" letter-spacing="4"
    fill="white" opacity="0.36"
  >— STEVE JOBS</text>

  <!-- Profile views pill — dark background so readable on any theme -->
  <rect x="342" y="136" width="176" height="18" rx="9" fill="url(#pillBg)" stroke="white" stroke-opacity="0.10" stroke-width="0.5"/>
  <text x="430" y="149" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" letter-spacing="2"
    fill="white" opacity="0.45">profile views</text>

</svg>
