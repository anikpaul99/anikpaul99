<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 64" width="860" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#07091a"/>
      <stop offset="50%"  stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#07091a"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00d4aa" stop-opacity="0"/>
