  </defs>
  <rect width="860" height="72" fill="url(#bg)" rx="4"/>
  <rect x="0" y="0"  width="860" height="1" fill="url(#bh)"/>
  <rect x="0" y="71" width="860" height="1" fill="url(#bh)"/>
  <line x1="48"  y1="36" x2="228" y2="36" stroke="url(#rule)"  stroke-width="0.7"/>
  <line x1="632" y1="36" x2="812" y2="36" stroke="url(#ruleR)" stroke-width="0.7"/>
  <text x="430" y="24" text-anchor="middle"
